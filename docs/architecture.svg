<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" font-family="'IBM Plex Sans', -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="0.55" stop-color="#0D1829"/>
      <stop offset="1" stop-color="#0B1420"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00C2FF"/>
      <stop offset="1" stop-color="#38d9ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1080" height="460" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1079" height="459" rx="16" fill="none" stroke="#1E2D45"/>

  <!-- title -->
  <text x="40" y="50" fill="#00C2FF" font-family="'IBM Plex Mono', monospace" font-size="12" letter-spacing="3">// SYSTEM ARCHITECTURE</text>
  <text x="40" y="82" fill="#E2E8F0" font-size="24" font-weight="600">ABAP Modernization Copilot</text>
  <text x="40" y="106" fill="#64748B" font-size="13">End-to-end flow — runs entirely inside one Next.js app (React UI + serverless API routes)</text>

  <!-- pipeline nodes -->
  <!-- node template: box 150x110 -->
  <g>
    <!-- 1 Upload -->
    <rect x="40" y="150" width="170" height="118" rx="12" fill="#161D2B" stroke="#00C2FF" stroke-opacity="0.5"/>
    <circle cx="72" cy="184" r="18" fill="#00C2FF" fill-opacity="0.12"/>
    <text x="72" y="190" text-anchor="middle" font-size="18">📂</text>
    <text x="100" y="190" fill="#E2E8F0" font-size="14" font-weight="600">Upload</text>
    <text x="60" y="222" fill="#94A3B8" font-size="11.5">Drag &amp; drop ABAP</text>
    <text x="60" y="240" fill="#94A3B8" font-size="11.5">files or a .zip</text>
    <text x="60" y="258" fill="#64748B" font-size="10.5" font-family="'IBM Plex Mono', monospace">React UI</text>

    <!-- 2 Rules engine -->
    <rect x="250" y="150" width="170" height="118" rx="12" fill="#161D2B" stroke="#7C3AFF" stroke-opacity="0.5"/>
    <circle cx="282" cy="184" r="18" fill="#7C3AFF" fill-opacity="0.14"/>
    <text x="282" y="190" text-anchor="middle" font-size="18">⚙️</text>
    <text x="310" y="190" fill="#E2E8F0" font-size="14" font-weight="600">Rules engine</text>
    <text x="270" y="222" fill="#94A3B8" font-size="11.5">YAML simplification</text>
    <text x="270" y="240" fill="#94A3B8" font-size="11.5">items, pattern match</text>
    <text x="270" y="258" fill="#64748B" font-size="10.5" font-family="'IBM Plex Mono', monospace">16 rules · open data</text>

    <!-- 3 Claude / demo -->
    <rect x="460" y="150" width="170" height="118" rx="12" fill="#161D2B" stroke="#00FF9C" stroke-opacity="0.5"/>
    <circle cx="492" cy="184" r="18" fill="#00FF9C" fill-opacity="0.12"/>
    <text x="492" y="190" text-anchor="middle" font-size="18">🤖</text>
    <text x="520" y="190" fill="#E2E8F0" font-size="14" font-weight="600">AI engine</text>
    <text x="480" y="222" fill="#94A3B8" font-size="11.5">Claude augments —</text>
    <text x="480" y="240" fill="#94A3B8" font-size="11.5">or demo fallback</text>
    <text x="480" y="258" fill="#64748B" font-size="10.5" font-family="'IBM Plex Mono', monospace">no key needed</text>

    <!-- 4 Findings -->
    <rect x="670" y="150" width="170" height="118" rx="12" fill="#161D2B" stroke="#FF6B35" stroke-opacity="0.5"/>
    <circle cx="702" cy="184" r="18" fill="#FF6B35" fill-opacity="0.12"/>
    <text x="702" y="190" text-anchor="middle" font-size="18">📊</text>
    <text x="730" y="190" fill="#E2E8F0" font-size="14" font-weight="600">Findings</text>
    <text x="690" y="222" fill="#94A3B8" font-size="11.5">Severity, effort,</text>
    <text x="690" y="240" fill="#94A3B8" font-size="11.5">readiness score</text>
    <text x="690" y="258" fill="#64748B" font-size="10.5" font-family="'IBM Plex Mono', monospace">+ risk heatmap</text>

    <!-- 5 Report -->
    <rect x="880" y="150" width="160" height="118" rx="12" fill="#161D2B" stroke="#00C2FF" stroke-opacity="0.5"/>
    <circle cx="912" cy="184" r="18" fill="#00C2FF" fill-opacity="0.12"/>
    <text x="912" y="190" text-anchor="middle" font-size="18">📄</text>
    <text x="940" y="190" fill="#E2E8F0" font-size="14" font-weight="600">Report</text>
    <text x="900" y="222" fill="#94A3B8" font-size="11.5">Executive .docx</text>
    <text x="900" y="240" fill="#94A3B8" font-size="11.5">+ remediation diff</text>
    <text x="900" y="258" fill="#64748B" font-size="10.5" font-family="'IBM Plex Mono', monospace">python-docx-style</text>
  </g>

  <!-- arrows -->
  <g stroke="#64748B" stroke-width="1.6">
    <line x1="212" y1="209" x2="246" y2="209" marker-end="url(#arrow)"/>
    <line x1="422" y1="209" x2="456" y2="209" marker-end="url(#arrow)"/>
    <line x1="632" y1="209" x2="666" y2="209" marker-end="url(#arrow)"/>
    <line x1="842" y1="209" x2="876" y2="209" marker-end="url(#arrow)"/>
  </g>

  <!-- secondary outputs row -->
  <g>
    <rect x="460" y="320" width="380" height="96" rx="12" fill="#0c131f" stroke="#1E2D45"/>
    <text x="480" y="348" fill="#94A3B8" font-family="'IBM Plex Mono', monospace" font-size="10.5" letter-spacing="2">ALSO POWERED BY THE SAME ENGINE</text>
    <text x="480" y="374" fill="#E2E8F0" font-size="13">💬 Conversational Q&amp;A grounded in your scan</text>
    <text x="480" y="398" fill="#E2E8F0" font-size="13">🔧 Remediation deep-dive · before/after ABAP diff</text>
  </g>

  <!-- MCP callout -->
  <g>
    <rect x="40" y="320" width="380" height="96" rx="12" fill="#0c131f" stroke="#7C3AFF" stroke-opacity="0.4"/>
    <text x="60" y="348" fill="#A78BFA" font-family="'IBM Plex Mono', monospace" font-size="10.5" letter-spacing="2">MCP SERVER LAYER</text>
    <text x="60" y="374" fill="#E2E8F0" font-size="13">Scan engine exposed as Model Context</text>
    <text x="60" y="398" fill="#E2E8F0" font-size="13">Protocol tools — invoke from Claude Desktop</text>
  </g>

  <!-- connector from rules engine down to MCP -->
  <path d="M335 268 C335 300 230 300 230 318" fill="none" stroke="#7C3AFF" stroke-opacity="0.45" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <path d="M545 268 C545 300 650 300 650 318" fill="none" stroke="#64748B" stroke-opacity="0.5" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
